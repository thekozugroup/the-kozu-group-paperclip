schema: "paperclip/v1"
agents:
  bohr:
    role: "associate"
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.5"
        search: true
      type: "codex_local"
    runtime:
      heartbeat:
        intervalSec: 900
  copernicus:
    role: "associate"
    adapter:
      config:
        model: "opencode/minimax-m2.5-free"
        variant: "high"
      type: "opencode_local"
    runtime:
      heartbeat:
        intervalSec: 900
  curie:
    role: "associate"
    adapter:
      config:
        model: "claude-haiku-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 900
  euclid:
    role: "associate"
    adapter:
      config:
        chrome: true
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 900
  euler:
    role: "associate"
    adapter:
      config:
        model: "opencode/gpt-5-nano"
      type: "codex_local"
    runtime:
      heartbeat:
        intervalSec: 1200
  fermi:
    role: "ceo"
    icon: "brain"
    adapter:
