schema: "paperclip/v1"
agents:
  # ─── Executive layer ────────────────────────────────────────────
  fermi:
    role: "ceo"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
      heartbeat:
        intervalSec: 300
    permissions:
      canCreateAgents: true

  # ─── Cross-arm (direct to Fermi) ────────────────────────────────
  euler:
    role: "associate"
    reportsTo: "fermi"
    adapter:
      type: "opencode_local"
      config:
        model: "opencode/gpt-5-nano"
    runtime:
      heartbeat:
        intervalSec: 1200
    permissions:
      canCreateAgents: false
  popper:
    role: "associate"
    reportsTo: "fermi"
    adapter:
      type: "opencode_local"
      config:
        model: "opencode/nemotron-3-super-free"
    runtime:
      heartbeat:
        intervalSec: 1200
    permissions:
      canCreateAgents: false

  # ─── Directors ──────────────────────────────────────────────────
  kepler:
    role: "director"
    reportsTo: "fermi"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
      heartbeat:
        intervalSec: 600
    permissions:
      canCreateAgents: true
  maxwell:
    role: "director"
    reportsTo: "fermi"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
      heartbeat:
        intervalSec: 600
    permissions:
      canCreateAgents: true
  planck:
    role: "director"
    reportsTo: "fermi"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
      heartbeat:
        intervalSec: 600
    permissions:
      canCreateAgents: true

  # ─── Personal Brand associates (Kepler's team) ──────────────────
  tycho:
    role: "associate"
    reportsTo: "kepler"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.5"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false
  copernicus:
    role: "associate"
    reportsTo: "kepler"
    adapter:
      type: "opencode_local"
      config:
        model: "opencode/minimax-m2.5-free"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false
  hubble:
    role: "associate"
    reportsTo: "kepler"
    adapter:
      type: "opencode_local"
      config:
        model: "opencode/minimax-m2.5-free"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false

  # ─── Kōzu Consulting associates (Maxwell's team) ────────────────
  euclid:
    role: "associate"
    reportsTo: "maxwell"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.5"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false
  curie:
    role: "associate"
    reportsTo: "maxwell"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false
  feynman:
    role: "associate"
    reportsTo: "maxwell"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false

  # ─── Kōzu AI associates (Planck's team) ─────────────────────────
  minkowski:
    role: "associate"
    reportsTo: "planck"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.5"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false
  bohr:
    role: "associate"
    reportsTo: "planck"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.5"
    runtime:
      heartbeat:
        intervalSec: 900
    permissions:
      canCreateAgents: false
  sagan:
    role: "associate"
    reportsTo: "planck"
    adapter:
      type: "claude_local"
      config:
        dangerouslySkipPermissions: true
        model: "claude-sonnet-4-6"
    runtime:
